<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 520" role="img" aria-labelledby="title desc">
  <title id="title">Forth interpreter flow</title>
  <desc id="desc">Source text passes through the ANTLR lexer and parser, then a Python visitor updates the stack and produces output.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
  </defs>
  <g font-family="Inter, Segoe UI, Arial, sans-serif" text-anchor="middle">
    <g fill="none" stroke="#475569" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)">
      <path d="M310 92 V116"/>
      <path d="M310 192 V216"/>
      <path d="M310 292 V316"/>
      <path d="M310 392 V416"/>
    </g>

    <g>
      <rect x="110" y="20" width="400" height="72" rx="14" fill="#e0f2fe" stroke="#0369a1" stroke-width="2"/>
      <circle cx="150" cy="56" r="20" fill="#0369a1"/>
      <text x="150" y="62" fill="#ffffff" font-size="17" font-weight="700">1</text>
      <text x="310" y="52" fill="#0f172a" font-size="19" font-weight="700">Forth source</text>
      <text x="310" y="75" fill="#334155" font-size="14">words, definitions and control flow</text>
    </g>
    <g>
      <rect x="110" y="120" width="400" height="72" rx="14" fill="#f8fafc" stroke="#475569" stroke-width="2"/>
      <circle cx="150" cy="156" r="20" fill="#475569"/>
      <text x="150" y="162" fill="#ffffff" font-size="17" font-weight="700">2</text>
      <text x="310" y="152" fill="#0f172a" font-size="19" font-weight="700">ANTLR lexer</text>
      <text x="310" y="175" fill="#334155" font-size="14">turns characters into tokens</text>
    </g>
    <g>
      <rect x="110" y="220" width="400" height="72" rx="14" fill="#f8fafc" stroke="#475569" stroke-width="2"/>
      <circle cx="150" cy="256" r="20" fill="#475569"/>
      <text x="150" y="262" fill="#ffffff" font-size="17" font-weight="700">3</text>
      <text x="310" y="252" fill="#0f172a" font-size="19" font-weight="700">ANTLR parser</text>
      <text x="310" y="275" fill="#334155" font-size="14">validates syntax and builds the parse tree</text>
    </g>
    <g>
      <rect x="110" y="320" width="400" height="72" rx="14" fill="#f8fafc" stroke="#475569" stroke-width="2"/>
      <circle cx="150" cy="356" r="20" fill="#475569"/>
      <text x="150" y="362" fill="#ffffff" font-size="17" font-weight="700">4</text>
      <text x="310" y="352" fill="#0f172a" font-size="19" font-weight="700">Python visitor</text>
      <text x="310" y="375" fill="#334155" font-size="14">executes built-ins and user definitions</text>
    </g>
    <g>
      <rect x="110" y="420" width="400" height="72" rx="14" fill="#dcfce7" stroke="#15803d" stroke-width="2"/>
      <circle cx="150" cy="456" r="20" fill="#15803d"/>
      <text x="150" y="462" fill="#ffffff" font-size="17" font-weight="700">5</text>
      <text x="310" y="452" fill="#0f172a" font-size="19" font-weight="700">Stack and output</text>
      <text x="310" y="475" fill="#334155" font-size="14">mutated values and printed results</text>
    </g>
  </g>
</svg>
