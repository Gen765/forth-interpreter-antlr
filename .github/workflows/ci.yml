name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14.0"
          cache: pip
      - name: Install dependencies
        run: python -m pip install -r requirements.txt
      - name: Run tests
        run: |
          python -m unittest discover -s tests -p "test_*.py" -v
          python -m doctest tests/test.txt -v
      - name: Run example
        run: python examples/run_example.py

  regeneration:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14.0"
          cache: pip
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - run: python -m pip install -r requirements-dev.txt
      - run: antlr4 -v 4.13.2 -Dlanguage=Python3 -no-listener -visitor forth.g4
      - run: git diff --exit-code -- forthLexer.py forthParser.py forthVisitor.py
